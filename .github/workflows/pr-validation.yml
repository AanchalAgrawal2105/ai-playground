name: PR Validation

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches:
      - main

jobs:
  # Validate PR title follows conventional commits
  pr-title-check:
    name: PR Title Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Check PR title format
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            build
            ci
            chore
          requireScope: false
          subjectPattern: ^[A-Z].+$
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}"
            didn't match the configured pattern.

            Please ensure that the subject starts with an uppercase character.

  # Check PR size
  pr-size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          # Get number of changed lines
          CHANGED_LINES=$(git diff --shortstat origin/${{ github.base_ref }}...HEAD | awk '{print $4+$6}')

          echo "Changed lines: $CHANGED_LINES"

          if [ "$CHANGED_LINES" -gt 1000 ]; then
            echo "⚠️ This PR is quite large ($CHANGED_LINES lines changed)."
            echo "Consider breaking it into smaller PRs for easier review."
            echo "::warning::Large PR detected ($CHANGED_LINES lines)"
          else
            echo "✅ PR size is reasonable"
          fi

  # Check for secrets in code
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Check for TODO/FIXME comments
  todo-check:
    name: TODO/FIXME Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for TODOs and FIXMEs
        run: |
          echo "Checking for TODO/FIXME comments..."

          TODO_COUNT=$(grep -r "TODO" agents/ --exclude-dir=.venv --exclude-dir=__pycache__ | wc -l || echo 0)
          FIXME_COUNT=$(grep -r "FIXME" agents/ --exclude-dir=.venv --exclude-dir=__pycache__ | wc -l || echo 0)

          echo "Found $TODO_COUNT TODO comments"
          echo "Found $FIXME_COUNT FIXME comments"

          if [ "$TODO_COUNT" -gt 0 ] || [ "$FIXME_COUNT" -gt 0 ]; then
            echo "::warning::Found $TODO_COUNT TODO and $FIXME_COUNT FIXME comments"
            grep -rn "TODO\|FIXME" agents/ --exclude-dir=.venv --exclude-dir=__pycache__ || true
          fi

  # Require description
  pr-description-check:
    name: PR Description Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Check PR description
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const body = pr.body || '';

            if (body.length < 50) {
              core.setFailed('PR description is too short. Please provide a meaningful description (at least 50 characters).');
            } else {
              console.log('✅ PR description is adequate');
            }

  # Check for breaking changes
  breaking-changes-check:
    name: Breaking Changes Check
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for breaking changes
        run: |
          echo "Checking for potential breaking changes..."

          # Check if any public API files were modified
          CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD)

          BREAKING_FILES=(
            "agents/airflow_intelligence/__init__.py"
            "agents/airflow_intelligence/src/__init__.py"
            "agents/airflow_intelligence/src/core/__init__.py"
          )

          for file in "${BREAKING_FILES[@]}"; do
            if echo "$CHANGED_FILES" | grep -q "$file"; then
              echo "⚠️ Public API file modified: $file"
              echo "::warning::Public API file modified: $file - ensure backwards compatibility"
            fi
          done

  # Label based on changed files
  auto-label:
    name: Auto Label PR
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Label PR based on changed files
        uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          configuration-path: .github/labeler.yml

  # All checks must pass
  pr-validation-success:
    name: PR Validation Success
    runs-on: ubuntu-latest
    needs: [pr-title-check, pr-size-check, secret-scan, pr-description-check, breaking-changes-check]
    if: always() && github.event.pull_request.draft == false
    steps:
      - name: Check all validations
        run: |
          if [[ "${{ needs.pr-title-check.result }}" == "success" ]] && \
             [[ "${{ needs.pr-size-check.result }}" == "success" ]] && \
             [[ "${{ needs.secret-scan.result }}" == "success" ]] && \
             [[ "${{ needs.pr-description-check.result }}" == "success" ]] && \
             [[ "${{ needs.breaking-changes-check.result }}" == "success" ]]; then
            echo "✅ All PR validations passed!"
          else
            echo "❌ Some PR validations failed"
            exit 1
          fi
