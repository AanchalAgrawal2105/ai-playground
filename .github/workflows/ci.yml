name: CI - Tests and Quality Checks

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - dev

jobs:
  # Job 1: Code Quality Checks
  code-quality:
    name: Code Quality
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r agents/airflow_intelligence/requirements.txt

      - name: Run black (code formatting check)
        run: |
          black --check agents/ --exclude='.venv|__pycache__|.git'

      - name: Run isort (import sorting check)
        run: |
          isort --check-only agents/ --skip .venv --skip __pycache__

      - name: Run flake8 (linting)
        run: |
          flake8 agents/ --exclude=.venv,__pycache__,.git --max-line-length=100 --extend-ignore=E203,E501,W503

      - name: Run mypy (type checking)
        continue-on-error: true  # Optional for now
        run: |
          mypy agents/airflow_intelligence/src --ignore-missing-imports || echo "Type checking found issues (non-blocking)"

  # Job 2: Unit Tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -r agents/airflow_intelligence/requirements.txt

      - name: Run unit tests
        run: |
          pytest agents/airflow_intelligence/tests/ \
            -v \
            --junitxml=test-results.xml \
            --cov=agents/airflow_intelligence/src \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.9'
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ matrix.python-version }}
          path: |
            test-results.xml
            htmlcov/

  # Job 3: Security Checks
  security:
    name: Security Scanning
    runs-on: ubuntu-latest
    continue-on-error: true  # Optional check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install safety bandit

      - name: Run safety (dependency vulnerability check)
        continue-on-error: true
        run: |
          safety check --json || echo "Vulnerabilities found (non-blocking for now)"

      - name: Run bandit (security linting)
        run: |
          bandit -r agents/ -ll -x '*/.venv/*,*/tests/*' --format json -o bandit-report.json || true
          bandit -r agents/ -ll -x '*/.venv/*,*/tests/*' || echo "Security issues found"

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: bandit-report.json

  # Job 4: Import Verification
  import-check:
    name: Import Verification
    runs-on: ubuntu-latest
    continue-on-error: true  # Optional check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agents/airflow_intelligence/requirements.txt

      - name: Test all imports
        run: |
          python -c "
          from agents.airflow_intelligence import (
              AgentOrchestrator,
              AgentConfig,
              AgentMemory,
              ProactiveMonitor,
              DatabaseTools,
              SlackTools,
              create_orchestrator
          )
          print('✅ All imports working')
          "

  # Job 5: Documentation Check
  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    continue-on-error: true  # Optional check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check documentation files exist
        run: |
          required_docs=(
            "README.md"
            "LICENSE"
            "agents/airflow_intelligence/README.md"

          for doc in "${required_docs[@]}"; do
            if [ ! -f "$doc" ]; then
              echo "❌ Missing: $doc"
              exit 1
            else
              echo "✅ Found: $doc"
            fi
          done

      - name: Check for broken markdown links
        uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: 'yes'
          config-file: '.github/markdown-link-check-config.json'
        continue-on-error: true

  # Job 6: Build Check
  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    continue-on-error: true  # Optional check
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          cd agents/airflow_intelligence
          python -m build

      - name: Check package with twine
        run: |
          cd agents/airflow_intelligence
          twine check dist/*

  # Summary Job
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [code-quality, unit-tests, security, import-check, docs-check, build-check]
    if: always()
    steps:
      - name: Check required jobs
        run: |
          # Only require code-quality and unit-tests to pass
          # Other checks are optional (security, import-check, docs-check, build-check)
          if [[ "${{ needs.code-quality.result }}" == "success" ]] && \
             [[ "${{ needs.unit-tests.result }}" == "success" ]]; then
            echo "✅ All required CI checks passed!"
            echo "Code Quality: ${{ needs.code-quality.result }}"
            echo "Unit Tests: ${{ needs.unit-tests.result }}"
            echo ""
            echo "Optional checks:"
            echo "Security: ${{ needs.security.result }}"
            echo "Import Check: ${{ needs.import-check.result }}"
            echo "Docs Check: ${{ needs.docs-check.result }}"
            echo "Build Check: ${{ needs.build-check.result }}"
            exit 0
          else
            echo "❌ Required CI checks failed"
            echo "Code Quality: ${{ needs.code-quality.result }}"
            echo "Unit Tests: ${{ needs.unit-tests.result }}"
            exit 1
          fi
