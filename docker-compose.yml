# Main docker-compose for production and development

services:
  # Airflow Monitoring Agent
  airflow-monitor:
    build:
      context: .
      target: production
    container_name: airflow-monitor
    environment:
      - AIRFLOW_DB_URL=${AIRFLOW_DB_URL}
      - AWS_REGION=${AWS_REGION}
      - MODEL_ID=${MODEL_ID}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_CHANNEL=${SLACK_CHANNEL}
      - ENABLE_SLACK_NOTIFICATIONS=${ENABLE_SLACK_NOTIFICATIONS:-true}
      - WINDOW_HOURS=${WINDOW_HOURS:-24}
      - BASELINE_DAYS=${BASELINE_DAYS:-14}
      - MIN_HISTORY=${MIN_HISTORY:-10}
      - ANOMALY_MULTIPLIER=${ANOMALY_MULTIPLIER:-1.5}
    volumes:
      - ./logs:/home/app/logs
      - ./config:/home/app/config
    networks:
      - monitoring-network
    restart: unless-stopped
    depends_on:
      - postgres
    command: ["python", "-m", "airflow_monitoring.airflow_runtime_agent"]

  # PostgreSQL for Airflow (for local testing)
  postgres:
    image: postgres:13
    container_name: airflow-postgres
    environment:
      - POSTGRES_DB=airflow
      - POSTGRES_USER=airflow
      - POSTGRES_PASSWORD=airflow123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - monitoring-network
    restart: unless-stopped

  # Redis for Airflow (optional, for Celery executor)
  redis:
    image: redis:7-alpine
    container_name: airflow-redis
    ports:
      - "6379:6379"
    networks:
      - monitoring-network
    restart: unless-stopped

  # Development environment
  airflow-monitor-dev:
    build:
      context: .
      target: development
    container_name: airflow-monitor-dev
    environment:
      - AIRFLOW_DB_URL=${AIRFLOW_DB_URL}
      - AWS_REGION=${AWS_REGION}
      - MODEL_ID=${MODEL_ID}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - SLACK_BOT_TOKEN=${SLACK_BOT_TOKEN}
      - SLACK_CHANNEL=${SLACK_CHANNEL}
      - ENABLE_SLACK_NOTIFICATIONS=${ENABLE_SLACK_NOTIFICATIONS:-false}
    volumes:
      - .:/home/app/project
      - ./logs:/home/app/logs
    networks:
      - monitoring-network
    profiles:
      - dev
    depends_on:
      - postgres
    command: ["bash"]

volumes:
  postgres_data:

networks:
  monitoring-network:
    driver: bridge