# Development docker-compose with additional services

services:
  # Inherit from main compose file
  airflow-monitor:
    extends:
      file: docker-compose.yml
      service: airflow-monitor-dev
    volumes:
      - .:/home/app/project:cached
      - ./tests:/home/app/tests:cached
    environment:
      - PYTEST_CURRENT_TEST=1
      - PYTHONPATH=/home/app/project/src

  postgres:
    extends:
      file: docker-compose.yml
      service: postgres

  # Test database (separate from main)
  postgres-test:
    image: postgres:13
    container_name: airflow-postgres-test
    environment:
      - POSTGRES_DB=airflow_test
      - POSTGRES_USER=airflow_test
      - POSTGRES_PASSWORD=airflow_test
    ports:
      - "5433:5432"
    networks:
      - monitoring-network
    tmpfs:
      - /var/lib/postgresql/data

  # Slack simulator for testing
  slack-simulator:
    image: nginx:alpine
    container_name: slack-simulator
    ports:
      - "8080:80"
    volumes:
      - ./tests/fixtures/slack-simulator.conf:/etc/nginx/nginx.conf:ro
    networks:
      - monitoring-network
    profiles:
      - test

volumes:
  postgres_data:

networks:
  monitoring-network:
    driver: bridge