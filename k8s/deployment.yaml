apiVersion: v1
kind: ConfigMap
metadata:
  name: airflow-monitoring-config
  namespace: monitoring
data:
  WINDOW_HOURS: "24"
  BASELINE_DAYS: "14"
  MIN_HISTORY: "10"
  ANOMALY_MULTIPLIER: "1.5"
  AWS_REGION: "eu-west-1"
  SLACK_CHANNEL: "#test-notification-ai"
  SLACK_USERNAME: "Airflow Monitor"
  ENABLE_SLACK_NOTIFICATIONS: "true"

---
apiVersion: v1
kind: Secret
metadata:
  name: airflow-monitoring-secrets
  namespace: monitoring
type: Opaque
data:
  # Base64 encoded values - replace with actual encoded secrets
  AIRFLOW_DB_URL: cG9zdGdyZXNxbDovL3VzZXI6cGFzc0BkYi9haXJmbG93
  AWS_ACCESS_KEY_ID: QUtJQVRFU1Q=
  AWS_SECRET_ACCESS_KEY: dGVzdC1zZWNyZXQ=
  MODEL_ID: YW50aHJvcGljLmNsYXVkZS0zLTUtc29ubmV0
  SLACK_BOT_TOKEN: eG94Yi10ZXN0LXRva2Vu

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: airflow-monitoring
  namespace: monitoring
  labels:
    app: airflow-monitoring
    version: v1.0.0
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: airflow-monitoring
  template:
    metadata:
      labels:
        app: airflow-monitoring
        version: v1.0.0
    spec:
      serviceAccountName: airflow-monitoring
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
      - name: airflow-monitoring
        image: ghcr.io/hellofresh/airflow-monitoring:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8000
          name: http
          protocol: TCP
        env:
        # ConfigMap values
        - name: WINDOW_HOURS
          valueFrom:
            configMapKeyRef:
              name: airflow-monitoring-config
              key: WINDOW_HOURS
        - name: BASELINE_DAYS
          valueFrom:
            configMapKeyRef:
              name: airflow-monitoring-config
              key: BASELINE_DAYS
        - name: MIN_HISTORY
          valueFrom:
            configMapKeyRef:
              name: airflow-monitoring-config
              key: MIN_HISTORY
        - name: ANOMALY_MULTIPLIER
          valueFrom:
            configMapKeyRef:
              name: airflow-monitoring-config
              key: ANOMALY_MULTIPLIER
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: airflow-monitoring-config
              key: AWS_REGION
        - name: SLACK_CHANNEL
          valueFrom:
            configMapKeyRef:
              name: airflow-monitoring-config
              key: SLACK_CHANNEL
        - name: ENABLE_SLACK_NOTIFICATIONS
          valueFrom:
            configMapKeyRef:
              name: airflow-monitoring-config
              key: ENABLE_SLACK_NOTIFICATIONS
        # Secret values
        - name: AIRFLOW_DB_URL
          valueFrom:
            secretKeyRef:
              name: airflow-monitoring-secrets
              key: AIRFLOW_DB_URL
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: airflow-monitoring-secrets
              key: AWS_ACCESS_KEY_ID
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: airflow-monitoring-secrets
              key: AWS_SECRET_ACCESS_KEY
        - name: MODEL_ID
          valueFrom:
            secretKeyRef:
              name: airflow-monitoring-secrets
              key: MODEL_ID
        - name: SLACK_BOT_TOKEN
          valueFrom:
            secretKeyRef:
              name: airflow-monitoring-secrets
              key: SLACK_BOT_TOKEN
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /ready
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /home/app/config
          readOnly: true
        - name: logs
          mountPath: /home/app/logs
      volumes:
      - name: config
        emptyDir: {}
      - name: logs
        emptyDir: {}
      imagePullSecrets:
      - name: ghcr-secret

---
apiVersion: v1
kind: Service
metadata:
  name: airflow-monitoring-service
  namespace: monitoring
  labels:
    app: airflow-monitoring
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: airflow-monitoring

---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: airflow-monitoring
  namespace: monitoring
  labels:
    app: airflow-monitoring