apiVersion: batch/v1
kind: CronJob
metadata:
  name: airflow-monitoring-cronjob
  namespace: monitoring
  labels:
    app: airflow-monitoring-cron
spec:
  # Run every hour
  schedule: "0 * * * *"
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: airflow-monitoring-cron
        spec:
          serviceAccountName: airflow-monitoring
          restartPolicy: OnFailure
          containers:
          - name: airflow-monitoring
            image: ghcr.io/hellofresh/airflow-monitoring:latest
            imagePullPolicy: Always
            command:
            - python
            - -m
            - airflow_monitoring.airflow_runtime_agent
            env:
            # ConfigMap values
            - name: WINDOW_HOURS
              valueFrom:
                configMapKeyRef:
                  name: airflow-monitoring-config
                  key: WINDOW_HOURS
            - name: BASELINE_DAYS
              valueFrom:
                configMapKeyRef:
                  name: airflow-monitoring-config
                  key: BASELINE_DAYS
            - name: MIN_HISTORY
              valueFrom:
                configMapKeyRef:
                  name: airflow-monitoring-config
                  key: MIN_HISTORY
            - name: ANOMALY_MULTIPLIER
              valueFrom:
                configMapKeyRef:
                  name: airflow-monitoring-config
                  key: ANOMALY_MULTIPLIER
            - name: AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: airflow-monitoring-config
                  key: AWS_REGION
            - name: SLACK_CHANNEL
              valueFrom:
                configMapKeyRef:
                  name: airflow-monitoring-config
                  key: SLACK_CHANNEL
            - name: ENABLE_SLACK_NOTIFICATIONS
              valueFrom:
                configMapKeyRef:
                  name: airflow-monitoring-config
                  key: ENABLE_SLACK_NOTIFICATIONS
            # Secret values
            - name: AIRFLOW_DB_URL
              valueFrom:
                secretKeyRef:
                  name: airflow-monitoring-secrets
                  key: AIRFLOW_DB_URL
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: airflow-monitoring-secrets
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: airflow-monitoring-secrets
                  key: AWS_SECRET_ACCESS_KEY
            - name: MODEL_ID
              valueFrom:
                secretKeyRef:
                  name: airflow-monitoring-secrets
                  key: MODEL_ID
            - name: SLACK_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: airflow-monitoring-secrets
                  key: SLACK_BOT_TOKEN
            resources:
              requests:
                memory: "256Mi"
                cpu: "100m"
              limits:
                memory: "512Mi"
                cpu: "500m"
            volumeMounts:
            - name: logs
              mountPath: /home/app/logs
          volumes:
          - name: logs
            emptyDir: {}
          imagePullSecrets:
          - name: ghcr-secret
  # Keep 3 successful and 1 failed job
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1